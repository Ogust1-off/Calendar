<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Calendar &middot; Shortcut</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Calendar"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#000" media="(prefers-color-scheme:dark)"/>
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme:light)"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" sizes="180x180" href="Asset/Picture/icon-180.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="Asset/Picture/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="120x120" href="Asset/Picture/icon-120.png"/>
  <link rel="icon" sizes="32x32" href="Asset/Picture/icon-32.png"/>
  <link rel="stylesheet" href="Asset/CSS/styleagenda_b.css"/>
  <style>
  /* ── Tokens ── */
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;
    --lbl:rgba(255,255,255,.92);--lbl2:rgba(255,255,255,.55);--lbl3:rgba(255,255,255,.28);
    --sep:rgba(255,255,255,.10);--sep2:rgba(255,255,255,.06);--fill:rgba(255,255,255,.08);
    --tint:#0a84ff;--red:#ff453a;
    --glass:rgba(28,28,30,.82);--gblur:blur(32px) saturate(180%);--gbdr:rgba(255,255,255,.12);
    --text:var(--lbl);--nb:52px;--tb:49px;
  }
  @media(prefers-color-scheme:light){:root{
    --bg:#f2f2f7;--bg2:#fff;--bg3:#efeff4;
    --lbl:rgba(0,0,0,.88);--lbl2:rgba(0,0,0,.50);--lbl3:rgba(0,0,0,.28);
    --sep:rgba(0,0,0,.10);--sep2:rgba(0,0,0,.05);--fill:rgba(0,0,0,.06);
    --tint:#007aff;--red:#ff3b30;
    --glass:rgba(242,242,247,.85);--gbdr:rgba(255,255,255,.9);
    --text:rgba(0,0,0,.88);
  }}
  /* Force dark mode */
  [data-theme="dark"]{
    --bg:#000!important;--bg2:#1c1c1e!important;--bg3:#2c2c2e!important;
    --lbl:rgba(255,255,255,.92)!important;--lbl2:rgba(255,255,255,.55)!important;--lbl3:rgba(255,255,255,.28)!important;
    --sep:rgba(255,255,255,.10)!important;--sep2:rgba(255,255,255,.06)!important;--fill:rgba(255,255,255,.08)!important;
    --tint:#0a84ff!important;--red:#ff453a!important;
    --glass:rgba(28,28,30,.82)!important;--gbdr:rgba(255,255,255,.12)!important;
    --text:rgba(255,255,255,.92)!important;
    color-scheme:dark;
  }
  /* Force light mode */
  [data-theme="light"]{
    --bg:#f2f2f7!important;--bg2:#fff!important;--bg3:#efeff4!important;
    --lbl:rgba(0,0,0,.88)!important;--lbl2:rgba(0,0,0,.50)!important;--lbl3:rgba(0,0,0,.28)!important;
    --sep:rgba(0,0,0,.10)!important;--sep2:rgba(0,0,0,.05)!important;--fill:rgba(0,0,0,.06)!important;
    --tint:#007aff!important;--red:#ff3b30!important;
    --glass:rgba(242,242,247,.85)!important;--gbdr:rgba(255,255,255,.9)!important;
    --text:rgba(0,0,0,.88)!important;
    color-scheme:light;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{height:100%;background:var(--bg);color-scheme:dark light}
  body{height:100%;background:var(--bg);color:var(--lbl);
    font-family:-apple-system,"SF Pro Text",ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
    overscroll-behavior:none;overflow:hidden}
  @media(orientation:landscape){body::after{content:'Please rotate to portrait';
    position:fixed;inset:0;z-index:99999;background:var(--bg);color:var(--lbl2);
    display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;}}

  /* ── Splash ── */
  #splash{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;
    justify-content:center;background:var(--bg);
    transition:opacity .4s ease,transform .4s ease;pointer-events:none}
  #splash.hide{opacity:0;transform:scale(1.04)}
  #splash-inner{display:flex;flex-direction:column;align-items:center;gap:14px}
  #splash-logo{animation:sp-pop .5s cubic-bezier(.34,1.56,.64,1) both;
    filter:drop-shadow(0 8px 24px rgba(99,102,241,.5))}
  #splash-logo svg{border-radius:16px}
  @keyframes sp-pop{from{opacity:0;transform:scale(.7) translateY(10px)}to{opacity:1;transform:scale(1)}}
  #splash-name{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--lbl);
    animation:sp-fade .4s .15s ease both;font-family:-apple-system,"SF Pro Display",sans-serif}
  #splash-sub{font-size:14px;color:var(--lbl3);animation:sp-fade .4s .25s ease both}
  @keyframes sp-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ── Shell ── */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;height:100dvh}

  /* ── Navbar ── */
  #nb{flex-shrink:0;display:flex;align-items:flex-end;gap:10px;
    padding:0 14px 10px;padding-top:calc(env(safe-area-inset-top,0px) + 4px);
    background:var(--glass);backdrop-filter:var(--gblur);-webkit-backdrop-filter:var(--gblur);
    border-bottom:.5px solid var(--gbdr);z-index:200}
  .nb-brand{display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;min-width:0}
  .nb-ico{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.3)}
  .nb-ico img{width:100%;height:100%;object-fit:cover;display:block}
  .nb-name{font-size:17px;font-weight:600;letter-spacing:-.025em;color:var(--lbl);line-height:1.1}
  .nb-sub{font-size:11px;color:var(--lbl3);display:block;font-weight:400}
  #nb-upd{font-size:11px;color:var(--lbl3);white-space:nowrap;flex-shrink:0}
  #nb-avatar-wrap.has-photo{border-radius:50%!important}
  #nb-avatar-wrap.has-photo img{border-radius:50%}

  /* ── Views ── */
  .view{display:none;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
    padding-bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 80px)}
  .view.on{display:block}
  #v-week.on{display:flex;flex-direction:column;overflow:hidden;padding-bottom:0}

  /* ── Agenda ── */
  #v-agenda .agenda-widget{background:none!important;border:none!important;
    box-shadow:none!important;backdrop-filter:none!important;margin:0!important;overflow:visible!important}
  #v-agenda .aw-header{display:none!important}
  #v-agenda .aw-compact-day-hd{position:sticky!important;top:0!important;z-index:40!important;
    display:flex!important;align-items:center!important;gap:8px!important;padding:6px 18px 5px!important;
    background:var(--glass)!important;backdrop-filter:var(--gblur)!important;
    -webkit-backdrop-filter:var(--gblur)!important;border-bottom:.5px solid var(--sep)!important;
    border-top:none!important;margin-top:0!important;box-shadow:none!important}
  #v-agenda .aw-compact-day-label{font-size:13px!important;font-weight:600!important;
    text-transform:capitalize!important;color:var(--lbl2)!important;letter-spacing:-.01em!important}
  #v-agenda .aw-compact-day-label.today{color:var(--red)!important}
  #v-agenda .aw-today-pill{font-size:9px!important;font-weight:700!important;
    letter-spacing:.06em!important;text-transform:uppercase!important;color:var(--red)!important;
    background:rgba(255,69,58,.12)!important;border:1px solid rgba(255,69,58,.25)!important;
    padding:1px 7px!important;border-radius:99px!important}
  #v-agenda .aw-event{padding:12px 18px!important;border-bottom:.5px solid var(--sep2)!important;
    background:var(--bg2)!important;transition:background .1s!important;cursor:pointer}
  #v-agenda .aw-event:active{background:var(--bg3)!important}
  #v-agenda .aw-event:last-child{border-bottom:none!important}
  #v-agenda .aw-skipped-row{padding:7px 18px!important;background:var(--bg)!important}
  #v-agenda .aw-skipped-list{border-bottom:.5px solid var(--sep)!important}
  #v-agenda .aw-empty-state{background:var(--bg2)!important}
  .aw-time{display:flex;flex-direction:column;align-items:flex-end;gap:0;
    font-variant-numeric:tabular-nums;flex-shrink:0;min-width:52px;text-align:right}
  .aw-time-start{font-size:12px;color:var(--lbl2);font-weight:500;line-height:1.3}
  .aw-time-end{font-size:11px;color:var(--lbl3);line-height:1.3}
  .aw-time-single{font-size:12px;color:var(--lbl2)}
  .aw-pop{position:fixed!important;z-index:9999!important}

  /* ── Week header ── */
  #wk-hdr{flex-shrink:0;background:var(--glass);backdrop-filter:var(--gblur);
    -webkit-backdrop-filter:var(--gblur);border-bottom:.5px solid var(--gbdr);z-index:100;padding:12px 16px 0}
  #wk-month-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  #wk-month-lbl{font-size:22px;font-weight:700;letter-spacing:-.035em;color:var(--lbl);line-height:1}
  #wk-month-lbl span{font-weight:300;color:var(--lbl2);font-size:20px}
  .wk-today-btn{height:26px;padding:0 11px;border-radius:99px;border:none;background:var(--fill);
    color:var(--lbl2);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:background .15s,color .15s,transform .1s}
  .wk-today-btn:active{transform:scale(.93)}
  .wk-today-btn.active{background:var(--tint);color:#fff}
  #wk-days{display:grid;grid-template-columns:repeat(7,1fr);margin:0 -16px;padding:0 4px 10px}
  .wk-mini{display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 0;
    cursor:pointer;border-radius:10px;-webkit-tap-highlight-color:transparent;transition:background .1s;
    appearance:none;-webkit-appearance:none;background:none;border:none;font-family:inherit}
  .wk-mini:active{background:var(--fill)}
  .wk-mini-dow{font-size:11px;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:var(--lbl3);line-height:1}
  .wk-mini.is-today .wk-mini-dow{color:var(--red)}
  .wk-mini-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:400;color:var(--lbl);font-variant-numeric:tabular-nums;line-height:1;
    transition:background .15s,color .15s}
  .wk-mini.is-today .wk-mini-num{color:var(--red);font-weight:600}
  .wk-mini.is-sel .wk-mini-num{background:var(--tint);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(10,132,255,.35)}
  .wk-mini.is-today.is-sel .wk-mini-num{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(255,69,58,.35)}
  .wk-mini-dot{width:4px;height:4px;border-radius:50%;background:var(--lbl3);opacity:0;transition:opacity .15s;margin-top:-2px}
  .wk-mini.has-ev .wk-mini-dot{opacity:1}
  .wk-mini.is-sel .wk-mini-dot{background:rgba(255,255,255,.6)}
  .wk-mini.is-today:not(.is-sel) .wk-mini-dot{background:var(--red)}
  #wk-strip{flex:1;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #wk-strip::-webkit-scrollbar{display:none}
  .wk-page{flex:0 0 100%;scroll-snap-align:start;overflow:hidden;display:flex;flex-direction:column;min-height:0}
  .wk-grid-host{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 80px)}

  /* ── Day grid ── */
  .awd-grid{display:flex;position:relative}
  .awd-gutter{width:52px;flex-shrink:0;position:relative;border-right:.5px solid var(--sep);background:var(--bg)}
  .awd-hour-lbl{position:absolute;right:7px;font-size:10px;font-weight:400;color:var(--lbl3);
    font-variant-numeric:tabular-nums;transform:translateY(-50%);white-space:nowrap;line-height:1;user-select:none}
  .awd-col{flex:1;min-width:0;position:relative;background:var(--bg2)}
  .awd-hline{position:absolute;left:0;right:0;height:.5px;background:var(--sep2);pointer-events:none}
  .awd-hline.major{background:var(--sep)}
  .awd-now{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
  .awd-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}
  .aw-gev{border-radius:8px!important;padding:4px 7px 4px 11px!important;border:none!important;overflow:hidden!important}
  .aw-gev-accent{display:block!important;position:absolute!important;left:4px!important;top:4px!important;
    bottom:4px!important;width:3px!important;border-radius:99px!important}
  .aw-gev-name{font-size:10.5px!important;font-weight:600!important;color:rgba(255,255,255,.92)!important;
    white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;
    line-height:1.3!important;letter-spacing:-.01em!important;display:block!important}
  .aw-gev-time{font-size:9.5px!important;color:rgba(255,255,255,.6)!important;margin-top:1px!important;
    white-space:nowrap!important;overflow:hidden!important;font-variant-numeric:tabular-nums!important}
  .aw-gev-loc{font-size:9px!important;color:rgba(255,255,255,.45)!important;margin-top:1px!important;
    white-space:nowrap!important;overflow:hidden!important}
  .aw-gev:hover{filter:saturate(1.5) brightness(1.25)!important}
  .aw-gev-past{opacity:.5!important;filter:saturate(.6)!important}
  @media(prefers-color-scheme:light){
    .aw-gev-name{color:rgba(10,20,40,.88)!important}
    .aw-gev-time{color:rgba(10,20,40,.52)!important}
    .aw-gev-loc{color:rgba(10,20,40,.38)!important}}

  /* ── Account ── */
  .acc-page{padding:28px 20px 24px;display:flex;flex-direction:column;align-items:center;gap:24px}
  .acc-hero{display:flex;flex-direction:column;align-items:center;gap:12px}
  .acc-icon{width:78px;height:78px;border-radius:50%;overflow:hidden;position:relative;
    box-shadow:0 0 0 3px rgba(255,255,255,.1),0 4px 20px rgba(0,0,0,.25);cursor:pointer;transition:opacity .15s}
  .acc-icon:active{opacity:.75}
  .acc-icon img{width:100%;height:100%;object-fit:cover;display:block}
  .acc-name{font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--lbl);cursor:pointer}
  .acc-sub{font-size:13px;color:var(--lbl3)}
  .acc-rows{width:100%;background:var(--bg2);border-radius:14px;overflow:hidden;
    border:.5px solid var(--sep);box-shadow:0 2px 16px rgba(0,0,0,.18)}
  @media(prefers-color-scheme:light){.acc-rows{box-shadow:0 2px 16px rgba(0,0,0,.07)}}
  .acc-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border:none;
    background:none;color:var(--lbl);font-size:16px;font-family:inherit;cursor:pointer;
    text-align:left;width:100%;border-bottom:.5px solid var(--sep2);
    -webkit-tap-highlight-color:transparent;transition:background .1s}
  .acc-row:last-child{border-bottom:none}
  .acc-row:active{background:var(--bg3)}
  .acc-row-static{cursor:default!important}.acc-row-static:active{background:none!important}
  .acc-row-ico{font-size:18px;flex-shrink:0}
  .acc-row-lbl{flex:1}
  .acc-row-chv{width:12px;height:12px;color:var(--lbl3);flex-shrink:0}
  .acc-row-status{font-size:12px;color:var(--lbl3);flex-shrink:0}
  .acc-select{background:none;border:none;color:var(--tint);font-size:14px;font-family:inherit;
    outline:none;cursor:pointer;flex-shrink:0}
  .acc-row-danger .acc-row-lbl{color:#ff453a}
  @media(prefers-color-scheme:light){.acc-row-danger .acc-row-lbl{color:#ff3b30}}
  #acc-upd{font-size:12px;color:var(--lbl3)}

  /* ── Tab bar ── */
  #tb{position:fixed;bottom:0;left:0;right:0;
    height:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 14px);
    padding-bottom:env(safe-area-inset-bottom,0px);
    display:flex;align-items:flex-start;justify-content:center;z-index:200;
    background:none;border-top:none}
  #tb-pill{position:relative;display:flex;align-items:center;
    background:rgba(28,28,30,.88);
    backdrop-filter:blur(48px) saturate(200%);-webkit-backdrop-filter:blur(48px) saturate(200%);
    border:.5px solid rgba(255,255,255,.18);border-radius:99px;
    box-shadow:0 8px 32px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.14);
    margin-top:8px;padding:5px 8px;gap:2px;height:calc(var(--tb) - 2px)}
  @media(prefers-color-scheme:light){#tb-pill{background:rgba(248,248,250,.94);
    border-color:rgba(0,0,0,.10);box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.95)}}
  #tb-slider{position:absolute;top:5px;bottom:5px;border-radius:99px;
    background:rgba(10,132,255,.18);pointer-events:none;
    transition:left .25s cubic-bezier(.4,0,.2,1),width .25s}
  @media(prefers-color-scheme:light){#tb-slider{background:rgba(0,122,255,.12)}}
  .tbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:0 22px;height:100%;min-width:80px;border:none;background:none;cursor:pointer;
    color:var(--lbl3);font-family:inherit;-webkit-tap-highlight-color:transparent;
    border-radius:99px;transition:color .2s,transform .1s;position:relative;z-index:1}
  .tbtn:active{transform:scale(.88)}
  .tbtn.on{color:var(--tint)}
  .tbtn svg{width:24px;height:24px}
  .tbtn span{font-size:11px;font-weight:500;letter-spacing:.01em}

  /* ── Install banner ── */
  #ib{display:none;position:fixed;bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 10px);
    left:16px;right:16px;background:var(--glass);backdrop-filter:var(--gblur);
    -webkit-backdrop-filter:var(--gblur);border:.5px solid var(--gbdr);border-radius:14px;
    padding:12px 16px;gap:12px;align-items:center;color:var(--lbl);
    box-shadow:0 4px 24px rgba(0,0,0,.3);z-index:300;animation:ib-rise .3s cubic-bezier(.34,1.4,.64,1)}
  #ib.on{display:flex}
  @keyframes ib-rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .ib-ico{font-size:24px;flex-shrink:0}
  .ib-txt{flex:1}.ib-txt strong{display:block;font-size:14px;font-weight:600;margin-bottom:2px}
  .ib-txt small{font-size:12px;color:var(--lbl2)}
  .ib-x{background:none;border:none;color:var(--lbl3);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-inner">
    <div id="splash-logo">
      <svg viewBox="0 0 48 48" fill="none" width="80" height="80">
        <rect width="48" height="48" rx="13" fill="url(#sg)"/>
        <path d="M28 9L17 26h11L19 39l15-19H23L28 9z" fill="white" opacity=".95"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="48" y2="48">
          <stop stop-color="#3b82f6"/><stop offset="1" stop-color="#6366f1"/>
        </linearGradient></defs>
      </svg>
    </div>
    <div id="splash-name">Calendar</div>
    <div id="splash-sub">by Shortcut&#8482;</div>
  </div>
</div>

<!-- Splash script — immediately after splash div so it can remove it synchronously -->
<script>
(function(){
  var hasCfg=false;
  try{var c=JSON.parse(localStorage.getItem('shortcut_config')||'null');
    hasCfg=!!(c&&(c.apiKey||c.cal1Ical)&&((c.calendars&&c.calendars[0])||c.cal1Ical));}catch(e){}
  if(!hasCfg){var s=document.getElementById('splash');if(s)s.remove();}
  var done=false;
  window._hideSplash=function(){
    if(done)return;done=true;
    var s=document.getElementById('splash');if(!s)return;
    s.classList.add('hide');setTimeout(function(){if(s.parentNode)s.remove();},450);
  };
  if(hasCfg)setTimeout(window._hideSplash,4000);
  // Expose lang helper early
  window._getLang=function(){try{var d=JSON.parse(localStorage.getItem('shortcut_config')||'null');return(d&&d.lang)||'en';}catch(e){return'en';}};
})();
</script>

<!-- i18n IIFE — before external scripts -->
<script>
(function(){
  var S={
    en:{today:'Today',allDay:'All day',inProgress:'In progress',completed:'COMPLETED',
      startingSoon:'STARTING SOON',left:'left',in:'in ',inLabel:'In',elapsed:'elapsed',
      justUpdated:'Just updated',offline:'Offline',updateFailed:'Update failed',
      noMoreToday:'No more events today',noUpcoming:'No upcoming events',
      enjoyBreak:'Enjoy the break!',haveGreatWe:'Have a great weekend!',
      nextClass:'Next class',tabAgenda:'Agenda',tabWeek:'Week',tabAccount:'Account',
      today2:'Today',locale:'en-GB',

<script>
'use strict';

/* ── Week view ── */
var _wkByDay=null,_wkToday=null,_wkDates=[],_wkCur=null,_wkDirty=false;
function _ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function wkInit(byDay,today){
  _wkByDay=byDay;_wkToday=today;
  if(!_wkCur||!_wkDates.includes(_wkCur))_wkCur=today;
  _wkDates=[];
  var td=new Date(today+'T00:00:00'),dow=td.getDay();
  var ws=new Date(td);ws.setDate(td.getDate()-(dow===0?6:dow-1));
  for(var i=0;i<56;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);_wkDates.push(_ds(d));}
  var strip=document.getElementById('wk-strip');if(!strip)return;
  strip.innerHTML='';
  _wkDates.forEach(function(ds){
    var p=document.createElement('div');p.className='wk-page';p.dataset.date=ds;
    var g=document.createElement('div');g.className='wk-grid-host';g.dataset.date=ds;
    p.appendChild(g);strip.appendChild(p);
  });
  wkSnap(_wkCur,false,true);wkUpdateHdr();
  var t;
  strip.addEventListener('scroll',function(){
    if(typeof awPopClose==='function')awPopClose();
    clearTimeout(t);t=setTimeout(function(){
      var s=document.getElementById('wk-strip');if(!s)return;
      var idx=Math.round(s.scrollLeft/s.offsetWidth);
      if(_wkDates[idx]&&_wkDates[idx]!==_wkCur){_wkCur=_wkDates[idx];wkUpdateHdr();wkPrefetch(_wkCur);}
    },60);
  },{passive:true});
  _wkDirty=false;
}
function wkPrefetch(ds){var idx=_wkDates.indexOf(ds);[-1,0,1].forEach(function(d){var i=idx+d;if(i>=0&&i<_wkDates.length)wkRenderPage(_wkDates[i]);});}
function wkRenderPage(ds){
  var strip=document.getElementById('wk-strip');if(!strip)return;
  var host=strip.querySelector('.wk-page[data-date="'+ds+'"] .wk-grid-host');
  if(!host||host.children.length>0)return;
  if(typeof awRenderDay==='function')awRenderDay(ds,host);
}
function wkSnap(ds,smooth,render){
  var strip=document.getElementById('wk-strip');if(!strip)return;
  var idx=_wkDates.indexOf(ds);if(idx<0)return;
  strip.scrollTo({left:idx*strip.offsetWidth,behavior:smooth?'smooth':'instant'});
  if(render)wkPrefetch(ds);
}
function wkUpdateHdr(){
  if(!_wkCur)return;
  var byDay=window._awByDay||{};
  var d=new Date(_wkCur+'T00:00:00');
  var locale=typeof window._appLocale==='function'?window._appLocale():'en-GB';
  var mo=d.toLocaleDateString(locale,{month:'long'});mo=mo[0].toUpperCase()+mo.slice(1);
  var ml=document.getElementById('wk-month-lbl');
  if(ml)ml.innerHTML='<strong>'+mo+'</strong> <span>'+d.getFullYear()+'</span>';
  var tb=document.getElementById('wk-today-btn');
  if(tb){tb.textContent=window._t?window._t('today2'):'Today';tb.classList.toggle('active',_wkCur===_wkToday);}
  var dow=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  var days=document.getElementById('wk-days');if(!days)return;
  days.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(function(l,i){
    var day=new Date(mon);day.setDate(mon.getDate()+i);var ds=_ds(day);
    var isT=(ds===_wkToday),isSel=(ds===_wkCur),hasEv=((byDay[ds]||[]).length>0);
    var cls='wk-mini'+(isT?' is-today':'')+(isSel?' is-sel':'')+(hasEv?' has-ev':'');
    var btn=document.createElement('button');btn.className=cls;btn.dataset.date=ds;
    btn.innerHTML='<span class="wk-mini-dow">'+l+'</span><span class="wk-mini-num">'+day.getDate()+'</span><span class="wk-mini-dot"></span>';
    (function(date){btn.addEventListener('click',function(){_wkCur=date;wkSnap(_wkCur,true,true);wkUpdateHdr();});})(ds);
    days.appendChild(btn);
  });
}
function wkGoToday(){_wkCur=_wkToday;wkSnap(_wkCur,true,true);wkUpdateHdr();}

/* ── Tabs ── */
var VIDS=['v-agenda','v-week','v-account'],TIDS=['tb-0','tb-1','tb-2'],_tab=0;
function goTab(i){
  _tab=i;
  VIDS.forEach(function(id,j){
    var el=document.getElementById(id);if(!el)return;
    if(j===i){el.classList.add('on');el.style.display=(id==='v-week'?'flex':'block');}
    else{el.classList.remove('on');el.style.display='none';}
  });
  TIDS.forEach(function(id,j){var el=document.getElementById(id);if(el)el.classList.toggle('on',j===i);});
  setTimeout(function(){if(typeof _updateSlider==='function')_updateSlider();},10);
  if(i===1){
    if(_wkByDay&&(_wkDirty||!document.getElementById('wk-strip').children.length))wkInit(_wkByDay,_wkToday);
    else if(_wkCur)setTimeout(function(){wkSnap(_wkCur,false,false);},50);
  }
  if(i===0){
    setTimeout(function(){
      var pill=document.querySelector('#v-agenda .aw-today-pill');
      if(pill){var hd=pill.closest('.aw-compact-day-hd');if(hd)hd.scrollIntoView({behavior:'smooth',block:'start'});}
    },60);
  }
}
function appRefresh(){_wkDirty=true;if(typeof awInit==='function')awInit();}
function forceRefresh(){appRefresh();}
function appShowAgenda(){goTab(0);}
function appShowWeek(){goTab(1);}

/* ── Pill swipe ── */
function _updateSlider(){
  var pill=document.getElementById('tb-pill'),sl=document.getElementById('tb-slider');if(!pill||!sl)return;
  var btns=pill.querySelectorAll('.tbtn');if(!btns[_tab])return;
  sl.style.left=btns[_tab].offsetLeft+'px';sl.style.width=btns[_tab].offsetWidth+'px';
}
function _initPillSwipe(){
  var pill=document.getElementById('tb-pill');if(!pill)return;
  var startX=0,startTab=0,moved=false;
  pill.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startTab=_tab;moved=false;var sl=document.getElementById('tb-slider');if(sl)sl.style.transition='none';},{passive:true});
  pill.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-startX;
    if(Math.abs(dx)>6){moved=true;
      var sl=document.getElementById('tb-slider');if(!sl)return;
      var btns=pill.querySelectorAll('.tbtn');if(!btns.length)return;
      var w=btns[startTab].offsetWidth;var base=btns[startTab].offsetLeft;
      var cl=Math.max(-w,Math.min(w,dx));sl.style.left=(base+cl)+'px';sl.style.width=w+'px';}
  },{passive:true});
  pill.addEventListener('touchend',function(e){
    var sl=document.getElementById('tb-slider');if(sl)sl.style.transition='left .25s cubic-bezier(.4,0,.2,1),width .25s';
    if(!moved){_updateSlider();return;}
    var dx=e.changedTouches[0].clientX-startX;
    var thresh=(pill.offsetWidth||240)/5;
    var newTab=startTab;
    if(dx<-thresh&&startTab<2)newTab=startTab+1;
    else if(dx>thresh&&startTab>0)newTab=startTab-1;
    if(newTab!==startTab)goTab(newTab);
    else _updateSlider();
    moved=false;
  },{passive:true});
}

/* ── Profile ── */
function _applyProfile(){
  try{
    var cfg=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};
    if(cfg.photo){
      var ni=document.getElementById('nb-avatar-img'),nw=document.getElementById('nb-avatar-wrap'),ai=document.getElementById('acc-avatar-img');
      if(ni)ni.src=cfg.photo;if(ai)ai.src=cfg.photo;
      if(nw){nw.classList.add('has-photo');nw.style.borderRadius='50%';}
    }
    if(cfg.displayName){var ne=document.getElementById('acc-display-name');if(ne)ne.textContent=cfg.displayName;}
    var sel=document.getElementById('acc-lang');if(sel&&cfg.lang)sel.value=cfg.lang;
    var tsel=document.getElementById('acc-theme');if(tsel&&cfg.theme)tsel.value=cfg.theme;
    if(cfg.theme)_applyTheme(cfg.theme);
  }catch(e){}
}

/* ── i18n apply ── */
function _applyLang(){
  var l=typeof window._getLang==='function'?window._getLang():'en';
  var t=window._t||function(k){return k;};
  var locale=t('locale')||'en-GB'; window._currentLocale=locale;
  // Tab labels
  ['Agenda','Week','Account'].forEach(function(def,i){
    var keys=['tabAgenda','tabWeek','tabAccount'];
    var el=document.getElementById('tab-lbl-'+i);if(el)el.textContent=t(keys[i])||def;
  });
  // Account labels
  var map={
    'acc-lang-lbl':'langLabel','acc-theme-lbl':'themeLabel',
    'acc-settings-lbl':'settingsTitle','acc-refresh-lbl':'refreshBtn',
    'acc-update-lbl':'updateAppBtn','acc-logout-lbl':'logoutBtn'
  };
  Object.keys(map).forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=t(map[id]);});
  // Theme select options
  var tsel=document.getElementById('acc-theme');
  if(tsel){tsel.options[0].text=t('themeAuto');tsel.options[1].text=t('themeDark');tsel.options[2].text=t('themeLight');}
  // Navbar sub
  var sub=document.querySelector('.nb-sub');if(sub)sub.textContent=t('byShortcut');
  // Lang selector
  var lsel=document.getElementById('acc-lang');if(lsel)lsel.value=l;
  // Rerender if data available
  if(window._awByDay&&typeof awRenderCompact==='function'){
    var today=typeof awToday==='function'?awToday():new Date().toISOString().slice(0,10);
    awRenderCompact(window._awByDay,today);
  }
  wkUpdateHdr();
}

/* ── Account actions ── */
function accSetLang(lang){
  try{var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};d.lang=lang;localStorage.setItem('shortcut_config',JSON.stringify(d));}catch(e){}
  location.reload();
}
function accSetTheme(v){
  try{var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};d.theme=v;localStorage.setItem('shortcut_config',JSON.stringify(d));}catch(e){}
  _applyTheme(v);
}
function _applyTheme(v){
  var r=document.documentElement;
  // Remove previous
  r.removeAttribute('data-theme');
  r.style.colorScheme='';
  if(v==='dark'){r.setAttribute('data-theme','dark');r.style.colorScheme='dark';}
  else if(v==='light'){r.setAttribute('data-theme','light');r.style.colorScheme='light';}
  var sel=document.getElementById('acc-theme');if(sel)sel.value=v||'auto';
}
function showCalSettings(){
  if(typeof _obOpenCalSettings==='function')_obOpenCalSettings();
  else if(typeof showSettings==='function')showSettings();
}
function accRefresh(){
  var ico=document.getElementById('acc-refresh-ico'),st=document.getElementById('acc-refresh-status');
  if(ico)ico.textContent='&#9203;';if(st)st.textContent='Updating\u2026';
  _wkDirty=true;
  if(typeof awInit==='function'){
    var p=awInit();
    var ok=function(){if(ico)ico.textContent='&#128260;';if(st)st.textContent='';};
    var done2=function(){if(ico)ico.textContent='&#9989;';if(st)st.textContent='Done!';setTimeout(ok,2500);};
    if(p&&p.then)p.then(done2);else setTimeout(done2,1200);
  }
}
function accUpdateApp(){
  var st=document.getElementById('acc-update-status');if(st)st.textContent='&#8987; Clearing\u2026';
  var p='caches' in window?caches.keys().then(function(k){return Promise.all(k.map(function(c){return caches.delete(c);}));}):Promise.resolve();
  p.then(function(){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(r){return Promise.all(r.map(function(x){return x.unregister();}));}).then(function(){if(st)st.textContent='&#9989; Done!';setTimeout(function(){location.reload(true);},800);});
    }else{if(st)st.textContent='&#9989; Done!';setTimeout(function(){location.reload(true);},800);}
  });
}
function accLogout(){
  var lang=typeof window._getLang==='function'?window._getLang():'en';
  var msg=lang==='fr'?'R\u00e9initialiser et se d\u00e9connecter\u00a0?':'Sign out and reset the app?';
  if(!confirm(msg))return;
  localStorage.removeItem('shortcut_config');
  location.reload();
}
function accEditProfile(){
  var ed=document.getElementById('acc-avatar-edit');
  if(ed){ed.style.display='flex';setTimeout(function(){ed.style.display='none';},300);}
  document.getElementById('acc-photo-input').click();
}
function accChangePhoto(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var url=e.target.result;
    try{var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};d.photo=url;localStorage.setItem('shortcut_config',JSON.stringify(d));}catch(ex){}
    _applyProfile();
  };reader.readAsDataURL(file);
}
function accEditName(){
  var el=document.getElementById('acc-display-name');if(!el)return;
  var cur=el.textContent;
  var inp=document.createElement('input');inp.type='text';inp.value=cur;
  inp.style.cssText='font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--lbl);background:none;border:none;border-bottom:2px solid var(--tint);outline:none;width:160px;text-align:center;font-family:inherit';
  el.replaceWith(inp);inp.focus();inp.select();
  function save(){
    var v=inp.value.trim()||cur;
    var div=document.createElement('div');div.className='acc-name';div.id='acc-display-name';
    div.onclick=accEditName;div.textContent=v;inp.replaceWith(div);
    try{var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};d.displayName=v;localStorage.setItem('shortcut_config',JSON.stringify(d));}catch(ex){}
    _applyProfile();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();save();}});
}

/* ── Sync loop ── */
var _lastTs=0;
setInterval(function(){
  if(typeof awLastUpdated!=='undefined'&&window._awByDay&&awLastUpdated!==_lastTs){
    _lastTs=awLastUpdated;
    var today=typeof awToday==='function'?awToday():new Date().toISOString().slice(0,10);
    _wkToday=today;_wkByDay=window._awByDay;_wkDirty=true;
    if(_tab===1)wkInit(_wkByDay,_wkToday);
    wkUpdateHdr();
  }
  var lm=window.matchMedia('(prefers-color-scheme:light)').matches;
  if(typeof _lm==='undefined')_lm=lm;
  if(lm!==_lm){_lm=lm;_wkDirty=true;if(_tab===1&&_wkByDay)wkInit(_wkByDay,_wkToday);}
},700);

/* ── Init ── */
window.addEventListener('load',function(){
  goTab(0);
  _applyProfile();
  _applyLang();
  _initPillSwipe();
  setTimeout(_updateSlider,100);
});

/* ── SW ── */
if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});

/* ── Install banner ── */
function dismissBanner(){document.getElementById('ib').classList.remove('on');localStorage.setItem('ib','1');}
window.addEventListener('load',function(){
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('ib'))
    setTimeout(function(){document.getElementById('ib').classList.add('on');},5000);
});
</script>
