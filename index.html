<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,orientation=portrait"/>
  <title>Calendar · Shortcut</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Calendar"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#000" media="(prefers-color-scheme:dark)"/>
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme:light)"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" sizes="180x180" href="Asset/Picture/icon-180.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="Asset/Picture/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="120x120" href="Asset/Picture/icon-120.png"/>
  <link rel="icon" sizes="32x32" href="Asset/Picture/icon-32.png"/>
  <link rel="stylesheet" href="Asset/CSS/styleagenda_b.css"/>
  <style>
  /* ── Tokens ── */
  :root {
    --bg:    #000; --bg2:  #1c1c1e; --bg3: #2c2c2e;
    --lbl:   rgba(255,255,255,.92); --lbl2: rgba(255,255,255,.55);
    --lbl3:  rgba(255,255,255,.28); --sep:  rgba(255,255,255,.10);
    --sep2:  rgba(255,255,255,.06); --fill: rgba(255,255,255,.08);
    --tint:  #0a84ff; --red: #ff453a;
    --glass: rgba(28,28,30,.82); --gblur: blur(32px) saturate(180%);
    --gbdr:  rgba(255,255,255,.12);
    /* compat */
    --text:var(--lbl);--muted:var(--lbl2);--faint:var(--lbl3);
    --border:var(--sep);--border-hi:rgba(255,255,255,.2);
    --accent:var(--tint);--sys-red:var(--red);--r-pill:999px;
    --nb:52px; --tb:49px;
  }
  @media(prefers-color-scheme:light){
    :root{
      --bg:#f2f2f7;--bg2:#fff;--bg3:#efeff4;
      --lbl:rgba(0,0,0,.88);--lbl2:rgba(0,0,0,.50);--lbl3:rgba(0,0,0,.28);
      --sep:rgba(0,0,0,.10);--sep2:rgba(0,0,0,.05);--fill:rgba(0,0,0,.06);
      --tint:#007aff;--red:#ff3b30;
      --glass:rgba(242,242,247,.85);--gbdr:rgba(255,255,255,.9);
      --text:rgba(0,0,0,.88);--muted:rgba(0,0,0,.50);--faint:rgba(0,0,0,.28);
      --border:rgba(0,0,0,.10);--accent:#007aff;--sys-red:#ff3b30;
    }
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{height:100%;background:var(--bg);color-scheme:dark light}
  @media(orientation:landscape){
    body::after{content:'Rotate to portrait';position:fixed;inset:0;
      background:var(--bg);color:var(--lbl2);display:flex;align-items:center;justify-content:center;
      font-size:17px;font-weight:500;z-index:99999;text-align:center;}
  }
  body{height:100%;background:var(--bg);color:var(--lbl);
    font-family:-apple-system,"SF Pro Text",ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
    overscroll-behavior:none;overflow:hidden}

  /* ── Shell ── */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;height:100%;height:100dvh}

  /* ── Navbar ── */
  #nb{flex-shrink:0;display:flex;align-items:flex-end;
    padding:0 14px calc(var(--nb)/4);
    padding-top:calc(env(safe-area-inset-top,0px) + 4px);
    background:var(--glass);backdrop-filter:var(--gblur);-webkit-backdrop-filter:var(--gblur);
    border-bottom:.5px solid var(--gbdr);z-index:200;gap:10px}
  .nb-brand{display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;min-width:0}
  .nb-ico{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.3)}
  .nb-ico img{width:100%;height:100%;object-fit:cover;display:block}
  .nb-name{font-size:17px;font-weight:600;letter-spacing:-.025em;color:var(--lbl);line-height:1.1;white-space:nowrap}
  .nb-sub{font-size:11px;color:var(--lbl3);display:block;font-weight:400}
  #nb-upd{font-size:11px;color:var(--lbl3);white-space:nowrap;flex-shrink:0}
  .nb-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--fill);
    color:var(--lbl2);display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
    transition:opacity .15s,transform .1s}
  .nb-btn:active{opacity:.55;transform:scale(.9)}
  .nb-btn svg{width:15px;height:15px}

  /* ── Views ── */
  .view{display:none;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
    padding-bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 32px)}
  .view.on{display:block}
  #v-week.on{display:flex;flex-direction:column;overflow:hidden;padding-bottom:0}

  /* ── Agenda view — original widget, polished ── */
  #v-agenda .agenda-widget{background:none!important;border:none!important;
    box-shadow:none!important;backdrop-filter:none!important;margin:0!important;overflow:visible!important}
  #v-agenda .aw-header{display:none!important}

  /* Sticky section header */
  #v-agenda .aw-compact-day-hd{
    position:sticky!important;top:0!important;z-index:40!important;
    display:flex!important;align-items:center!important;gap:8px!important;
    padding:6px 18px 5px!important;
    background:var(--glass)!important;
    backdrop-filter:var(--gblur)!important;-webkit-backdrop-filter:var(--gblur)!important;
    border-bottom:.5px solid var(--sep)!important;border-top:none!important;
    margin-top:0!important;box-shadow:none!important}
  #v-agenda .aw-compact-day-label{font-size:13px!important;font-weight:600!important;
    text-transform:capitalize!important;color:var(--lbl2)!important;letter-spacing:-.01em!important}
  #v-agenda .aw-compact-day-label.today{color:var(--red)!important}
  #v-agenda .aw-today-pill{font-size:9px!important;font-weight:700!important;
    letter-spacing:.06em!important;text-transform:uppercase!important;color:var(--red)!important;
    background:rgba(255,69,58,.12)!important;border:1px solid rgba(255,69,58,.25)!important;
    padding:1px 7px!important;border-radius:99px!important}

  /* Event rows */
  #v-agenda .aw-event{padding:12px 18px!important;border-bottom:.5px solid var(--sep2)!important;
    background:var(--bg2)!important;transition:background .1s!important}
  /* Two-line time column */
  .aw-time{display:flex;flex-direction:column;align-items:flex-end;gap:0;
    font-size:12px;color:var(--lbl2);font-variant-numeric:tabular-nums;flex-shrink:0;min-width:52px;text-align:right}
  .aw-time-start{font-size:12px;color:var(--lbl2);font-weight:500;line-height:1.3}
  .aw-time-end{font-size:11px;color:var(--lbl3);line-height:1.3}
  .aw-time-single{font-size:12px;color:var(--lbl2)}
  #v-agenda .aw-event:active{background:var(--bg3)!important}
  #v-agenda .aw-event:last-child{border-bottom:none!important}
  #v-agenda .aw-skipped-row{padding:7px 18px!important;background:var(--bg)!important}
  #v-agenda .aw-skipped-list{border-bottom:.5px solid var(--sep)!important}
  #v-agenda .aw-empty-state{background:var(--bg2)!important}

  /* ── Week view — header ── */
  #wk-hdr{
    flex-shrink:0;
    background:var(--glass);
    backdrop-filter:var(--gblur);-webkit-backdrop-filter:var(--gblur);
    border-bottom:.5px solid var(--gbdr);z-index:100;
    padding:12px 16px 0;
  }

  /* Month + year + Today button row */
  #wk-month-row{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:10px;
  }
  #wk-month-lbl{
    font-size:22px;font-weight:700;letter-spacing:-.035em;color:var(--lbl);
    line-height:1;
  }
  #wk-month-lbl span{font-weight:300;color:var(--lbl2);font-size:20px}
  .wk-today-btn{
    height:26px;padding:0 11px;border-radius:99px;border:none;
    background:var(--fill);color:var(--lbl2);
    font-size:12px;font-weight:500;font-family:inherit;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:background .15s,color .15s,transform .1s;
    letter-spacing:-.01em;
  }
  .wk-today-btn:active{transform:scale(.93)}
  .wk-today-btn.active{background:var(--tint);color:#fff}

  /* 7-day strip — Apple Calendar style */
  #wk-days{
    display:grid;grid-template-columns:repeat(7,1fr);
    margin:0 -16px;padding:0 4px 10px;
  }
  .wk-mini{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:4px 0;cursor:pointer;border-radius:10px;
    -webkit-tap-highlight-color:transparent;transition:background .1s;
    /* Reset native button appearance */
    appearance:none;-webkit-appearance:none;
    background:none;border:none;font-family:inherit;
  }
  .wk-mini:active{background:var(--fill)}
  /* Day-of-week letter */
  .wk-mini-dow{
    font-size:11px;font-weight:500;letter-spacing:.02em;
    text-transform:uppercase;color:var(--lbl3);line-height:1;
  }
  .wk-mini.is-today .wk-mini-dow{color:var(--red)}
  /* Date number circle */
  .wk-mini-num{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:400;color:var(--lbl);
    font-variant-numeric:tabular-nums;line-height:1;
    transition:background .15s,color .15s;
  }
  .wk-mini.is-today .wk-mini-num{
    color:var(--red);font-weight:600;
  }
  .wk-mini.is-sel .wk-mini-num{
    background:var(--tint);color:#fff;font-weight:600;
    box-shadow:0 2px 8px rgba(10,132,255,.35);
  }
  .wk-mini.is-today.is-sel .wk-mini-num{
    background:var(--red);color:#fff;
    box-shadow:0 2px 8px rgba(255,69,58,.35);
  }
  /* Event dot */
  .wk-mini-dot{
    width:4px;height:4px;border-radius:50%;
    background:var(--lbl3);opacity:0;transition:opacity .15s;
    margin-top:-2px;
  }
  .wk-mini.has-ev .wk-mini-dot{opacity:1}
  .wk-mini.is-sel .wk-mini-dot{background:rgba(255,255,255,.6)}
  .wk-mini.is-today:not(.is-sel) .wk-mini-dot{background:var(--red)}

  /* Scroll-snap strip */
  #wk-strip{flex:1;min-height:0;display:flex;
    overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  #wk-strip::-webkit-scrollbar{display:none}

  /* Day page — must allow inner scroll */
  .wk-page{flex:0 0 100%;scroll-snap-align:start;
    overflow:hidden;display:flex;flex-direction:column;min-height:0}

  /* Day grid container (written by awRenderDay) */
  .wk-grid-host{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;scroll-behavior:auto;
    padding-bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 32px)}

  /* Grid layout */
  .awd-grid{display:flex;position:relative}
  .awd-gutter{width:52px;flex-shrink:0;position:relative;
    border-right:.5px solid var(--sep);background:var(--bg)}
  .awd-hour-lbl{position:absolute;right:7px;font-size:10px;font-weight:400;
    color:var(--lbl3);font-variant-numeric:tabular-nums;
    transform:translateY(-50%);white-space:nowrap;line-height:1;user-select:none}
  .awd-col{flex:1;min-width:0;position:relative;background:var(--bg2)}
  .awd-hline{position:absolute;left:0;right:0;height:.5px;
    background:var(--sep2);pointer-events:none;z-index:0}
  .awd-hline.major{background:var(--sep)}
  .awd-now{position:absolute;left:0;right:0;height:2px;
    background:var(--red);z-index:10;pointer-events:none}
  .awd-now-dot{position:absolute;left:-5px;top:-4px;
    width:10px;height:10px;border-radius:50%;background:var(--red)}

  /* Event blocks — restore original aw-gev design */
  .aw-gev{border-radius:8px!important;padding:4px 7px 4px 11px!important;
    border:none!important;overflow:hidden!important}
  .aw-gev-accent{display:block!important;position:absolute!important;
    left:4px!important;top:4px!important;bottom:4px!important;
    width:3px!important;border-radius:99px!important}
  .aw-gev-name{font-size:10.5px!important;font-weight:600!important;
    color:rgba(255,255,255,.92)!important;
    white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;
    line-height:1.3!important;letter-spacing:-.01em!important;display:block!important}
  .aw-gev-time{font-size:9.5px!important;color:rgba(255,255,255,.6)!important;
    margin-top:1px!important;display:flex!important;align-items:center!important;
    white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;
    font-variant-numeric:tabular-nums!important}
  .aw-gev-loc{font-size:9px!important;color:rgba(255,255,255,.45)!important;
    margin-top:1px!important;display:flex!important;align-items:center!important;
    white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
  .aw-gev:hover{filter:saturate(1.5) brightness(1.25)!important;
    outline:.5px solid rgba(255,255,255,.35)!important;outline-offset:-1px!important}
  .aw-gev-past{opacity:.5!important;filter:saturate(.6)!important}
  @media(prefers-color-scheme:light){
    .aw-gev-name{color:rgba(10,20,40,.88)!important}
    .aw-gev-time{color:rgba(10,20,40,.52)!important}
    .aw-gev-loc{color:rgba(10,20,40,.38)!important}
    .aw-gev:hover{outline-color:rgba(0,0,0,.18)!important;
      filter:saturate(1.2) brightness(1.2)!important}
  }

  /* ── Account ── */
  .acc-page{padding:28px 20px 24px;display:flex;flex-direction:column;align-items:center;gap:28px}
  .acc-hero{display:flex;flex-direction:column;align-items:center;gap:12px}
  .acc-icon{width:78px;height:78px;border-radius:50%;overflow:hidden;
    box-shadow:0 0 0 3px rgba(255,255,255,.1),0 4px 20px rgba(0,0,0,.25);position:relative}
  .acc-icon img{width:100%;height:100%;object-fit:cover;display:block}
  /* Navbar avatar — round when profile pic set */
  #nb-avatar-wrap.has-photo{border-radius:50%!important}
  #nb-avatar-wrap.has-photo img{border-radius:50%}
  .acc-name{font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--lbl)}
  .acc-sub{font-size:13px;color:var(--lbl3)}
  .acc-rows{width:100%;background:var(--bg2);border-radius:10px;overflow:hidden;border:.5px solid var(--sep)}
  .acc-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border:none;
    background:none;color:var(--lbl);font-size:16px;font-family:inherit;
    cursor:pointer;text-align:left;width:100%;
    border-bottom:.5px solid var(--sep2);-webkit-tap-highlight-color:transparent;transition:background .1s}
  .acc-row:last-child{border-bottom:none}
  .acc-row:active{background:var(--bg3)}
  .acc-row-ico{font-size:18px;flex-shrink:0}
  .acc-row-lbl{flex:1}
  .acc-row-chv{width:12px;height:12px;color:var(--lbl3);flex-shrink:0}
  #acc-upd{font-size:12px;color:var(--lbl3)}
  .acc-row-static{cursor:default!important}
  .acc-row-static:active{background:none!important}
  .acc-select{background:none;border:none;color:var(--tint);font-size:14px;font-family:inherit;
    outline:none;cursor:pointer;text-align:right;flex-shrink:0;-webkit-appearance:auto}
  .acc-row-status{font-size:12px;color:var(--lbl3);flex-shrink:0}
  /* Tappable avatar */
  #acc-avatar-wrap{cursor:pointer;transition:opacity .15s}
  #acc-avatar-wrap:active{opacity:.75}

  /* ── Tab bar — Liquid Glass pill (iPhone style) ── */
  #tb{
    position:fixed;bottom:0;
    left:0;right:0;
    height:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 4px);
    padding-bottom:env(safe-area-inset-bottom,0px);
    display:flex;align-items:flex-start;justify-content:center;
    z-index:200;
    /* Glass background to fully cover content below */
    background:var(--glass);
    backdrop-filter:var(--gblur);-webkit-backdrop-filter:var(--gblur);
    border-top:.5px solid var(--gbdr);
  }
  /* Glass pill */
  #tb-pill{
    display:flex;align-items:center;
    background:rgba(30,30,32,.80);
    backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
    border:.5px solid rgba(255,255,255,.16);
    border-radius:99px;
    box-shadow:0 10px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12);
    margin-top:6px;
    padding:5px 8px;
    gap:2px;
    height:calc(var(--tb) - 4px);
  }
  @media(prefers-color-scheme:light){
    #tb-pill{
      background:rgba(240,240,245,.78);
      border-color:rgba(255,255,255,.9);
      box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.8);
    }
  }
  .tbtn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:0 22px;height:100%;min-width:80px;
    border:none;background:none;cursor:pointer;color:var(--lbl3);
    font-family:inherit;-webkit-tap-highlight-color:transparent;
    border-radius:99px;
    transition:color .2s,background .2s,transform .1s;
    position:relative;
  }
  .tbtn:active{transform:scale(.88)}
  .tbtn.on{
    color:var(--tint);
    background:rgba(10,132,255,.15);
  }
  @media(prefers-color-scheme:light){
    .tbtn.on{background:rgba(0,122,255,.12);}
  }
  .tbtn svg{width:24px;height:24px}
  .tbtn span{font-size:11px;font-weight:500;letter-spacing:.01em}
  .tb-line{display:none}

  /* ── Splash screen ── */
  #splash{
    position:fixed;inset:0;z-index:99999;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);
    transition:opacity .4s ease, transform .4s ease;
  }
  #splash.out{opacity:0;transform:scale(1.04);pointer-events:none}
  #splash-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
  #splash-logo{
    animation:splash-pop .5s cubic-bezier(.34,1.56,.64,1) both;
    filter:drop-shadow(0 8px 24px rgba(99,102,241,.5));
  }
  #splash-logo svg{border-radius:16px}
  @keyframes splash-pop{
    from{opacity:0;transform:scale(.7) translateY(10px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  #splash-name{
    font-size:28px;font-weight:800;letter-spacing:-.04em;
    color:var(--lbl);
    animation:splash-fade .4s .15s ease both;
    font-family:-apple-system,"SF Pro Display",sans-serif;
  }
  #splash-sub{
    font-size:14px;color:var(--lbl3);
    animation:splash-fade .4s .25s ease both;
  }
  @keyframes splash-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ── Install banner ── */
  #ib{display:none;position:fixed;
    bottom:calc(var(--tb) + env(safe-area-inset-bottom,0px) + 10px);
    left:16px;right:16px;
    background:var(--glass);backdrop-filter:var(--gblur);-webkit-backdrop-filter:var(--gblur);
    border:.5px solid var(--gbdr);border-radius:14px;padding:12px 16px;
    gap:12px;align-items:center;color:var(--lbl);
    box-shadow:0 4px 24px rgba(0,0,0,.3);z-index:300;
    animation:ib-rise .3s cubic-bezier(.34,1.4,.64,1)}
  #ib.on{display:flex}
  @keyframes ib-rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .ib-ico{font-size:24px;flex-shrink:0}
  .ib-txt{flex:1}
  .ib-txt strong{display:block;font-size:14px;font-weight:600;margin-bottom:2px}
  .ib-txt small{font-size:12px;color:var(--lbl2)}
  .ib-x{background:none;border:none;color:var(--lbl3);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div id="splash-inner">
    <div id="splash-logo">
      <svg viewBox="0 0 48 48" fill="none" width="72" height="72">
        <rect width="48" height="48" rx="13" fill="url(#sg)"/>
        <path d="M28 9L17 26h11L19 39l15-19H23L28 9z" fill="white" opacity=".95"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="48" y2="48">
          <stop stop-color="#3b82f6"/><stop offset="1" stop-color="#6366f1"/>
        </linearGradient></defs>
      </svg>
    </div>
    <div id="splash-name">Calendar</div>
    <div id="splash-sub">by Shortcut™</div>
  </div>
</div>

<div id="app">

  <!-- NAVBAR -->
  <header id="nb">
    <a class="nb-brand" href="#">
      <div class="nb-ico" id="nb-avatar-wrap">
        <img id="nb-avatar-img" src="Asset/Picture/icon-180.png" alt=""/>
      </div>
      <div><div class="nb-name">Calendar<span class="nb-sub">by Shortcut™</span></div></div>
    </a>
    <span id="nb-upd"></span>

<script>
'use strict';
/* ═══════════════════════════════════════
   WEEK VIEW — day-by-day time grid
═══════════════════════════════════════ */
var _wkByDay=null, _wkToday=null, _wkDates=[], _wkCur=null, _wkDirty=false;

function _ds(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function wkInit(byDay, today) {
  _wkByDay=byDay; _wkToday=today;
  if (!_wkCur || !_wkDates.includes(_wkCur)) _wkCur=today;

  _wkDates=[];
  // Include past days of current week
  var _td=new Date(today+'T00:00:00');
  var _dow=_td.getDay();
  var _wkStart=new Date(_td); _wkStart.setDate(_td.getDate()-(_dow===0?6:_dow-1));
  for (var i=0;i<56;i++) { var d=new Date(_wkStart); d.setDate(_wkStart.getDate()+i); _wkDates.push(_ds(d)); }

  var strip=document.getElementById('wk-strip');
  if (!strip) return;
  strip.innerHTML='';

  // Create page shells — grid filled lazily on snap
  _wkDates.forEach(function(ds) {
    var p=document.createElement('div'); p.className='wk-page'; p.dataset.date=ds;
    var g=document.createElement('div'); g.className='wk-grid-host'; g.dataset.date=ds;
    p.appendChild(g); strip.appendChild(p);
  });

  wkSnap(_wkCur, false, true);
  wkUpdateHdr();

  var t;
  // Close pop on horizontal swipe
  strip.addEventListener('touchstart', function() { if(typeof awPopClose==='function') awPopClose(); }, {passive:true});
  strip.addEventListener('scroll', function() {
    clearTimeout(t);
    t=setTimeout(function() {
      var s=document.getElementById('wk-strip'); if (!s) return;
      var idx=Math.round(s.scrollLeft/s.offsetWidth);
      if (_wkDates[idx] && _wkDates[idx]!==_wkCur) {
        _wkCur=_wkDates[idx]; wkUpdateHdr(); wkPrefetch(_wkCur);
        // Reset shared scroll position when changing days via mini-strip tap
      }
    }, 60);
  }, {passive:true});

  _wkDirty=false;
}

function wkPrefetch(ds) {
  var idx=_wkDates.indexOf(ds);
  [-1,0,1].forEach(function(d) { var i=idx+d; if(i>=0&&i<_wkDates.length) wkRenderPage(_wkDates[i]); });
}

function wkRenderPage(ds) {
  var strip=document.getElementById('wk-strip'); if (!strip) return;
  var host=strip.querySelector('.wk-page[data-date="'+ds+'"] .wk-grid-host');
  if (!host || host.children.length>0) return;
  if (typeof awRenderDay==='function') awRenderDay(ds, host);
}

function wkSnap(ds, smooth, render) {
  var strip=document.getElementById('wk-strip'); if (!strip) return;
  var idx=_wkDates.indexOf(ds); if (idx<0) return;
  strip.scrollTo({left:idx*strip.offsetWidth, behavior:smooth?'smooth':'instant'});
  if (render) wkPrefetch(ds);
}

function wkUpdateHdr() {
  if (!_wkCur) return;
  var byDay=window._awByDay||{};
  var d=new Date(_wkCur+'T00:00:00');

  // Month label
  var mo=d.toLocaleDateString('en-GB',{month:'long'});
  mo=mo[0].toUpperCase()+mo.slice(1);
  var ml=document.getElementById('wk-month-lbl');
  if (ml) ml.innerHTML='<strong>'+mo+'</strong> <span>'+d.getFullYear()+'</span>';

  var tb=document.getElementById('wk-today-btn');
  if (tb) tb.classList.toggle('active', _wkCur===_wkToday);

  // Mini day strip — 7 days of the current week
  var dow=d.getDay();
  var mon=new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
  var days=document.getElementById('wk-days'); if (!days) return;
  days.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(function(l,i) {
    var day=new Date(mon); day.setDate(mon.getDate()+i);
    var ds=_ds(day);
    var isT=(ds===_wkToday), isSel=(ds===_wkCur), hasEv=((byDay[ds]||[]).length>0);
    var cls='wk-mini'+(isT?' is-today':'')+(isSel?' is-sel':'')+(hasEv?' has-ev':'');
    var btn=document.createElement('button'); btn.className=cls; btn.dataset.date=ds;
    btn.innerHTML='<span class="wk-mini-dow">'+l+'</span><span class="wk-mini-num">'+day.getDate()+'</span><span class="wk-mini-dot"></span>';
    (function(date){ btn.addEventListener('click',function(){ _wkCur=date; wkSnap(_wkCur,true,true); wkUpdateHdr(); }); })(ds);
    days.appendChild(btn);
  });
}

function wkGoToday() { _wkCur=_wkToday; wkSnap(_wkCur,true,true); wkUpdateHdr(); }

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
var VIDS=['v-agenda','v-week','v-account'], TIDS=['tb-0','tb-1','tb-2'], _tab=0;

function goTab(i) {
  _tab=i;
  VIDS.forEach(function(id,j) {
    var el=document.getElementById(id); if (!el) return;
    if (j===i) { el.classList.add('on'); el.style.display=(id==='v-week'?'flex':'block'); }
    else { el.classList.remove('on'); el.style.display='none'; }
  });
  TIDS.forEach(function(id,j) { var el=document.getElementById(id); if (el) el.classList.toggle('on',j===i); });
  // Tab indicator
  var bar=document.getElementById('tb'), line=document.getElementById('tb-line');
  if (bar&&line) { var w=bar.offsetWidth/3; line.style.left=(i*w)+'px'; line.style.width=w+'px'; }

  // Week tab: init or restore
  if (i===1) {
    if (_wkByDay && (_wkDirty || !document.getElementById('wk-strip').children.length)) {
      wkInit(_wkByDay, _wkToday);
    } else if (_wkCur) {
      setTimeout(function(){ wkSnap(_wkCur,false,false); },50);
    }
  }
}

function forceRefresh() { appRefresh(); }
function appShowAgenda() { goTab(0); }
function appShowWeek()   { goTab(1); }

window.addEventListener('load', function() {
  goTab(0);
  _applyProfile();
  _applyI18n();

  // Splash: only show if calendar is already configured
  var _hasCfg = (function(){
    try { var d=JSON.parse(localStorage.getItem('shortcut_config')||'null'); return !!(d&&d.apiKey&&d.calendars&&d.calendars[0]); } catch(e){ return false; }
  })();

  var s = document.getElementById('splash');
  if (!_hasCfg) {
    // No config — remove splash immediately, onboarding will show
    if (s) s.remove();
  } else {
    // Config present — show splash, dismiss when data arrives or after 3s max
    var splashDone = false;
    function _hideSplash() {
      if (splashDone) return; splashDone = true;
      if (s) { s.classList.add('out'); setTimeout(function(){ if(s.parentNode) s.remove(); }, 450); }
    }
    // Safety timeout — never block the app more than 3s
    setTimeout(_hideSplash, 3000);
    // Dismiss as soon as data is rendered
    var _splashObs = setInterval(function(){
      if (typeof awLastUpdated !== 'undefined' && awLastUpdated) { clearInterval(_splashObs); _hideSplash(); }
    }, 100);
    // Also dismiss if onboarding opens (shouldn't happen if config is set, but just in case)
    var _splashObOb = setInterval(function(){
      if (document.getElementById('ob-overlay')) { clearInterval(_splashObOb); _hideSplash(); }
    }, 200);
  }
});

/* ═══════════════════════════════════════
   ACCOUNT FUNCTIONS
═══════════════════════════════════════ */
function accRefresh() {
  var btn = document.getElementById('acc-refresh-btn');
  var ico = document.getElementById('acc-refresh-ico');
  var st  = document.getElementById('acc-refresh-status');
  if (ico) ico.textContent = '⏳';
  if (st)  st.textContent = 'Updating…';
  _wkDirty = true;
  if (typeof awInit === 'function') {
    awInit().then ? awInit().then(function(){
      if (ico) ico.textContent = '✅';
      if (st)  st.textContent = 'Done!';
      setTimeout(function(){ if(ico) ico.textContent='🔄'; if(st) st.textContent=''; }, 2500);
    }) : setTimeout(function(){
      if (ico) ico.textContent = '✅';
      if (st)  st.textContent = 'Done!';
      setTimeout(function(){ if(ico) ico.textContent='🔄'; if(st) st.textContent=''; }, 2500);
    }, 1200);
  }
}

function accSetLang(lang) {
  try {
    var d = JSON.parse(localStorage.getItem('shortcut_config')||'null')||{};
    d.lang = lang; localStorage.setItem('shortcut_config', JSON.stringify(d));
  } catch(e){}
  // Apply without reload
  _applyI18n();
  // Also re-render agenda compact (day labels, today pill, etc.)
  if (window._awByDay && typeof awRenderCompact === 'function') {
    var today = typeof awToday === 'function' ? awToday() : new Date().toISOString().slice(0,10);
    awRenderCompact(window._awByDay, today);
  }
  // Invalidate week pages so they re-render with new locale
  _wkDirty = true;
}

function showCalSettings() {
  // Open a dedicated settings sheet (not the onboarding welcome)
  if (document.getElementById('ob-overlay')) return;
  if (typeof _obOpenCalSettings === 'function') { _obOpenCalSettings(); return; }
  // Fallback: open onboarding at step 1
  if (typeof showSettings === 'function') showSettings();
}

function accUpdateApp() {
  var st = document.getElementById('acc-update-status');
  if (st) st.textContent = '⌛ Clearing…';
  // Clear all SW caches except keep localStorage (config stays)
  var prom = 'caches' in window
    ? caches.keys().then(function(keys) { return Promise.all(keys.map(function(k){ return caches.delete(k); })); })
    : Promise.resolve();
  prom.then(function() {
    // Re-register SW with new cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
      }).then(function() {
        if (st) st.textContent = '✅ Done!';
        setTimeout(function(){ location.reload(true); }, 800);
      });
    } else {
      if (st) st.textContent = '✅ Done!';
      setTimeout(function(){ location.reload(true); }, 800);
    }
  });
}

function accEditProfile() {
  // Show edit overlay then open file picker
  var ed = document.getElementById('acc-avatar-edit');
  if (ed) { ed.style.display='flex'; setTimeout(function(){ ed.style.display='none'; },300); }
  document.getElementById('acc-photo-input').click();
}

function accChangePhoto(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    try { var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{}; d.photo=dataUrl; localStorage.setItem('shortcut_config',JSON.stringify(d)); } catch(ex){}
    _applyProfile();
  };
  reader.readAsDataURL(file);
}

function accEditName() {
  var el = document.getElementById('acc-display-name');
  if (!el) return;
  var cur = el.textContent;
  var inp = document.createElement('input');
  inp.type='text'; inp.value=cur; inp.className='acc-name-inp';
  inp.style.cssText='font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--lbl);background:none;border:none;border-bottom:2px solid var(--tint);outline:none;width:160px;text-align:center;font-family:inherit';
  el.replaceWith(inp); inp.focus(); inp.select();
  function save(){
    var v=inp.value.trim()||cur;
    var div=document.createElement('div'); div.className='acc-name'; div.id='acc-display-name';
    div.onclick=accEditName; div.textContent=v; inp.replaceWith(div);
    try { var d=JSON.parse(localStorage.getItem('shortcut_config')||'null')||{}; d.displayName=v; localStorage.setItem('shortcut_config',JSON.stringify(d)); } catch(ex){}
    _applyProfile();
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); save(); } });
}

// Agenda hover tooltip (for cut-off items)
function _initAgendaTooltips() {
  // Desktop-only: don't show tooltip on touch devices (causes double popup)
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) return;

  var compact = document.getElementById('aw-compact'); if (!compact) return;
  var tip = document.getElementById('agenda-tip');
  if (!tip) {
    tip = document.createElement('div'); tip.id='agenda-tip';
    tip.style.cssText='position:fixed;z-index:8000;background:rgba(28,28,30,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 11px;font-size:13px;color:rgba(255,255,255,.9);max-width:220px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 20px rgba(0,0,0,.4)';
    document.body.appendChild(tip);
  }
  compact.addEventListener('mouseover', function(e) {
    var ev = e.target.closest('.aw-event'); if (!ev) return;
    var name = ev.querySelector('.aw-name');
    if (!name) return;
    if (name.scrollWidth <= name.offsetWidth + 2) return;
    var idx = parseInt(ev.dataset.ev);
    var evObj = typeof awEvCache!=='undefined' ? awEvCache[idx] : null;
    if (!evObj) { tip.textContent = name.textContent; }
    else {
      var full = evObj.summary || '';
      tip.innerHTML = '<strong style="display:block;margin-bottom:3px">'+full+'</strong>';
      if (evObj.location) tip.innerHTML += '<span style="opacity:.6;font-size:11px">'+evObj.location.split(',')[0]+'</span>';
    }
    var r = ev.getBoundingClientRect();
    tip.style.left = Math.min(r.left, window.innerWidth-230)+'px';
    tip.style.top  = (r.top - tip.offsetHeight - 6)+'px';
    tip.style.opacity='1';
  });
  compact.addEventListener('mouseout', function(e) {
    if (!e.target.closest('.aw-event')) tip.style.opacity='0';
  });
}

var _HTML_STRINGS = {
  en: {
    tabAgenda:'Agenda', tabWeek:'Week', tabAccount:'Account',
    loading:'Loading…', today:'Today',
    settingsTitle:'Calendar API & Calendars',
    refreshBtn:'Refresh calendar',
    langLabel:'Language',
    updateAppBtn:'Update app',
    byShortcut:'by Shortcut™',
    accSub:'by Shortcut™ · © 2026 Ogust'1',
  },
  fr: {
    tabAgenda:'Agenda', tabWeek:'Semaine', tabAccount:'Compte',
    loading:'Chargement…', today:'Aujourd'hui',
    settingsTitle:'API & Agendas',
    refreshBtn:'Actualiser l'agenda',
    langLabel:'Langue',
    updateAppBtn:'Mettre à jour l'app',

  }
};

function _applyI18n() {
  var lang = 'en';
  try { var d=JSON.parse(localStorage.getItem('shortcut_config')||'null'); lang=(d&&d.lang)||'en'; } catch(e){}
  var s = _HTML_STRINGS[lang] || _HTML_STRINGS.en;
  // data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.dataset.i18n;
    if (s[key]) el.textContent = s[key];
  });
  // Today button in week view
  var tb = document.getElementById('wk-today-btn');
  if (tb) tb.textContent = s.today;
  // Navbar subtitle
  var sub = document.querySelector('.nb-sub');
  if (sub) sub.textContent = s.byShortcut;
  // Lang selector value
  var sel = document.getElementById('acc-lang');
  if (sel) sel.value = lang;
  // Account rows dynamic
  var refreshLbl = document.querySelector('#acc-refresh-btn .acc-row-lbl');
  if (refreshLbl) refreshLbl.textContent = s.refreshBtn;
  var settingsLbl = document.querySelector('button.acc-row[onclick="showCalSettings()"] .acc-row-lbl');
  if (settingsLbl) settingsLbl.textContent = s.settingsTitle;
}

function _applyProfile() {
  try {
    var cfg = JSON.parse(localStorage.getItem('shortcut_config') || 'null') || {};
    // Avatar
    var photo = cfg.photo || '';
    var nbImg = document.getElementById('nb-avatar-img');
    var nbWrap = document.getElementById('nb-avatar-wrap');
    var accImg = document.getElementById('acc-avatar-img');
    if (photo) {
      if (nbImg)  { nbImg.src = photo; }
      if (nbWrap) { nbWrap.classList.add('has-photo'); nbWrap.style.borderRadius='50%'; }
      if (accImg) { accImg.src = photo; }
    }
    // Display name
    var name = cfg.displayName || '';
    var nameEl = document.getElementById('acc-display-name');
    if (nameEl && name) nameEl.textContent = name;
  } catch(e) {}
}

/* Sync updated label + rebuild week on new data */
var _lastTs=0;
setInterval(function() {
  // Sync label
  var src=document.getElementById('aw-last-updated');
  ['nb-upd','acc-upd'].forEach(function(id) {
    var el=document.getElementById(id);
    if (src&&el&&src.textContent!==el.textContent) { el.textContent=src.textContent; el.style.color=src.style.color||''; }
  });
  // Tooltips
  _initAgendaTooltips();
  // New data
  if (typeof awLastUpdated!=='undefined' && window._awByDay && awLastUpdated!==_lastTs) {
    _lastTs=awLastUpdated;
    var today=(typeof awToday==='function')?awToday():new Date().toISOString().slice(0,10);
    _wkToday=today; _wkByDay=window._awByDay; _wkDirty=true;
    if (_tab===1) wkInit(_wkByDay,_wkToday);
    // Update mini dots
    wkUpdateHdr();
  }
  // Color scheme change
  var lm=window.matchMedia('(prefers-color-scheme:light)').matches;
  if (typeof _lm==='undefined') _lm=lm;
  if (lm!==_lm) { _lm=lm; _wkDirty=true; if(_tab===1&&_wkByDay) wkInit(_wkByDay,_wkToday); }
}, 700);

/* Service Worker */
if ('serviceWorker' in navigator)
  window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js').catch(function(){}); });

/* Install banner */
function dismissBanner() { document.getElementById('ib').classList.remove('on'); localStorage.setItem('ib','1'); }
window.addEventListener('load', function() {
  if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('ib'))
    setTimeout(function() { document.getElementById('ib').classList.add('on'); }, 5000);
});
</script>
