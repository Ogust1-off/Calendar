<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
        <title>Calendar</title>

        <!-- ── PWA / iPhone ── -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Shortcut" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="theme-color" content="#07080b" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#f0f2f7" media="(prefers-color-scheme: light)" />
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" sizes="180x180" href="Asset/Picture/icon-180.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="Asset/Picture/icon-152.png" />
        <link rel="apple-touch-icon" sizes="120x120" href="Asset/Picture/icon-120.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="Asset/Picture/icon-32.png" />

        <link rel="stylesheet" href="Asset/CSS/styleagenda_b.css">

        <style>
            :root{
                --glass-bg: rgba(255,255,255,0.06);
                --glass-border: rgba(255,255,255,0.08);
                --accent: #60a5fa;
                --bg:        #07080b;
                --border:    rgba(255,255,255,0.08);
                --border-hi: rgba(255,255,255,0.18);
                --text:      rgba(255,255,255,0.88);
                --muted:     rgba(255,255,255,0.44);
                --faint:     rgba(255,255,255,0.22);
                --r:         28px;
                --r-pill:    999px;
            }
            *,*::before,*::after { box-sizing: border-box; }
            html { background: #07080b; }
            body {
                margin: 0;
                min-height: 100%;
                min-height: -webkit-fill-available;
                -webkit-font-smoothing: antialiased;
                font-family: -apple-system, "SF Pro Display", Inter, ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial;
                background: #0d1017;
                color: #e6eef8;
                padding-top: env(safe-area-inset-top);
                padding-bottom: calc(env(safe-area-inset-bottom) + 60px);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                -webkit-overflow-scrolling: touch;
                overscroll-behavior-y: contain;
            }
            /* Fond dégradé subtil */
            body::before {
                content: '';
                position: fixed; inset: 0; z-index: -1;
                background:
                    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,0.08), transparent),
                    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(99,102,241,0.07), transparent),
                    #0d1017;
            }

            /* ── Carte principale ── */
            .glass-card {
                background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
                border: 1px solid rgba(255,255,255,0.06);
                backdrop-filter: blur(12px) saturate(140%);
                -webkit-backdrop-filter: blur(12px) saturate(140%);
                border-radius: 26px;
                box-shadow: 0 8px 40px rgba(0,6,23,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
                margin: 14px;
                transition: background 0.5s, color 0.5s, border 0.5s, box-shadow 0.5s;
            }

            /* ── Bouton paramètres dans l'header ── */
            .aw-settings-btn {
                width: 30px; height: 30px;
                display: flex; align-items: center; justify-content: center;
                background: rgba(255,255,255,0.06);
                border: 1px solid rgba(255,255,255,0.09);
                border-radius: 50%;
                cursor: pointer;
                color: rgba(255,255,255,0.4);
                transition: background 0.15s, color 0.15s, border-color 0.15s;
                flex-shrink: 0;
                margin-left: 6px;
            }
            .aw-settings-btn:hover {
                background: rgba(255,255,255,0.12);
                color: rgba(255,255,255,0.8);
                border-color: rgba(255,255,255,0.2);
            }
            .aw-settings-btn:active { transform: scale(0.92); }
            .aw-settings-btn svg { width: 14px; height: 14px; }

            /* ── Bannière installation iOS ── */
            #install-banner {
                display: none;
                position: fixed;
                bottom: calc(58px + env(safe-area-inset-bottom));
                left: 14px; right: 14px;
                background: rgba(18,22,35,0.97);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 18px;
                padding: 13px 16px;
                font-size: 13px;
                color: rgba(255,255,255,0.8);
                z-index: 1000;
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                box-shadow: 0 8px 36px rgba(0,0,0,0.55);
                gap: 10px;
                align-items: center;
                animation: bannerUp 0.35s cubic-bezier(.34,1.56,.64,1);
            }
            #install-banner.show { display: flex; }
            @keyframes bannerUp {
                from { opacity:0; transform:translateY(16px); }
                to   { opacity:1; transform:translateY(0); }
            }
            .install-icon { font-size: 22px; flex-shrink: 0; }
            .install-text { flex:1; line-height:1.45; }
            .install-text strong { display:block; font-size:13.5px; margin-bottom:2px; color:rgba(255,255,255,0.9); }
            .install-text span { font-size:12px; color:rgba(255,255,255,0.45); }
            .install-close {
                background:none; border:none; color:rgba(255,255,255,0.35);
                font-size:20px; cursor:pointer; padding:2px 4px; line-height:1;
                flex-shrink:0;
            }

            /* ── Footer ── */
            .footer-controls {
                position: fixed;
                bottom: calc(14px + env(safe-area-inset-bottom));
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                pointer-events: none;
            }
            .copyright {
                font-size: 10.5px;
                color: rgba(255,255,255,0.2);
                letter-spacing: 0.5px;
                display: flex; align-items: center; gap: 3px;
                pointer-events: all;
            }

            /* ── Light mode ── */
            @media (prefers-color-scheme: light) {
                html { background: #f0f2f7; }
                body { background: #f0f2f7; color: #1e293b; }
                body::before {
                    background:
                        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,0.06), transparent),
                        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(99,102,241,0.05), transparent),
                        #f0f2f7;
                }
                .glass-card {
                    background: rgba(255,255,255,0.8);
                    border: 1px solid rgba(0,0,0,0.07);
                    box-shadow: 0 6px 30px rgba(0,0,0,0.09), 0 1px 0 rgba(255,255,255,0.9) inset;
                    color: #1e293b;
                }
                .aw-settings-btn {
                    background: rgba(0,0,0,0.05);
                    border-color: rgba(0,0,0,0.1);
                    color: rgba(0,0,0,0.4);
                }
                .aw-settings-btn:hover {
                    background: rgba(0,0,0,0.1);
                    color: rgba(0,0,0,0.75);
                }
                .copyright { color: rgba(0,0,0,0.2); }
                #install-banner {
                    background: rgba(245,247,251,0.98);
                    border-color: rgba(0,0,0,0.08);
                    color: rgba(10,15,30,0.8);
                    box-shadow: 0 8px 36px rgba(0,0,0,0.12);
                }
                .install-text strong { color: rgba(10,15,30,0.9); }
                .install-text span { color: rgba(10,15,30,0.45); }
                .install-close { color: rgba(10,15,30,0.3); }
            }
        </style>
    </head>
    <body>
        <div id="calendar" class="glass-card agenda-widget">
            <div class="aw-header">
                <span class="aw-title">Agenda ECAM</span>
                <span class="aw-last-updated" id="aw-last-updated"></span>
                <button class="aw-toggle" id="aw-toggle-btn" onclick="awToggle()">
                    <span class="aw-btn-label">Calendar</span>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <!-- Bouton Paramètres -->
                <button class="aw-settings-btn" onclick="showSettings()" title="Paramètres" aria-label="Paramètres">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div id="aw-compact"><div class="aw-state"><span class="aw-spinner"></span>Chargement…</div></div>
            <div class="aw-full" id="aw-full"></div>
        </div>

        <!-- Bannière installation iOS -->
        <div id="install-banner">
            <div class="install-icon">📅</div>
            <div class="install-text">
                <strong>Installer Shortcut</strong>
                <span>Appuie sur <strong>⎙ Partager</strong> → <strong>Sur l'écran d'accueil</strong></span>
            </div>
            <button class="install-close" onclick="dismissBanner()" aria-label="Fermer">×</button>
        </div>

        <div class="footer-controls">
            <div class="copyright"><span>©</span> 2026 Ogust'1</div>
        </div>

        <!-- Scripts : onboarding AVANT agenda -->
        <script src="Asset/JS/onboarding.js"></script>
        <script src="Asset/JS/agenda_b.js"></script>

        <script>
            // ── Service Worker ──
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js').catch(function(){});
                });
            }

            // ── Bannière iOS ──
            function isIos() { return /iphone|ipad|ipod/i.test(navigator.userAgent); }
            function isStandalone() { return window.navigator.standalone === true; }
            function dismissBanner() {
                document.getElementById('install-banner').classList.remove('show');
                localStorage.setItem('install-dismissed', '1');
            }
            window.addEventListener('load', function() {
                if (isIos() && !isStandalone() && !localStorage.getItem('install-dismissed')) {
                    setTimeout(function() {
                        document.getElementById('install-banner').classList.add('show');
                    }, 3000);
                }
            });
        </script>
    </body>
</html>
